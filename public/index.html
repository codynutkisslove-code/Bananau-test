<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banana Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- UV Scripts (Standard paths for Ultraviolet) -->
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
</head>
<body>
    <div class="browser-container">
        <!-- Tab Bar -->
        <div class="tab-bar" id="tab-bar">
            <div class="tabs-container" id="tabs-container">
                <!-- Tabs injected by JS -->
            </div>
            <button class="new-tab-btn" onclick="createNewTab()" title="New Tab">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </div>

        <!-- Navigation Bar -->
        <div class="nav-bar">
            <div class="nav-buttons">
                <button class="icon-btn" onclick="navBack()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
                <button class="icon-btn" onclick="navForward()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
                <button class="icon-btn" onclick="reloadTab()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg></button>
            </div>

            <div class="address-bar-container">
                <select id="search-engine" onchange="changeSearchEngine()">
                    <option value="https://www.google.com/search?q=">Google</option>
                    <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
                    <option value="https://www.bing.com/search?q=">Bing</option>
                </select>
                <input type="text" id="address-input" placeholder="Search the web or enter URL..." onkeypress="handleEnter(event)">
                <button class="bookmark-btn" onclick="toggleBookmark()" id="bookmark-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                </button>
            </div>
        </div>

        <!-- Bookmarks Bar -->
        <div class="bookmarks-bar" id="bookmarks-bar">
            <!-- Bookmarks injected by JS -->
        </div>

        <!-- Viewports Container -->
        <div class="viewports" id="viewports">
            <!-- Iframes and Home screens injected by JS -->
        </div>
    </div>

    <!-- Home Screen Template -->
    <template id="home-template">
        <div class="home-screen">
            <div class="home-logo">
                <span class="banana-emoji">����</span>
                <h1>Banana Search</h1>
            </div>
            <div class="home-search">
                <input type="text" class="home-search-input" placeholder="What are you looking for?" onkeypress="handleHomeSearch(event, this)">
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
